<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020304"/>
      <stop offset="55%" stop-color="#07090c"/>
      <stop offset="100%" stop-color="#0a0d11"/>
    </linearGradient>
    <pattern id="hazard" width="22" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="22" height="10" fill="#0a0a0a"/>
      <rect width="11" height="10" fill="#ff1744"/>
    </pattern>
    <radialGradient id="hookGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- base panel -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect x="1.5" y="1.5" width="1197" height="297" fill="none" stroke="#ff1744" stroke-opacity="0.25" stroke-width="1"/>

  <!-- hazard edges -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#hazard)"/>
  <rect x="0" y="294" width="1200" height="6" fill="url(#hazard)"/>

  <!-- HUD corners (visible by default, pulse is a bonus) -->
  <g stroke="#ff1744" stroke-width="2.5" fill="none">
    <path d="M18,44 L18,18 L44,18"/>
    <path d="M1182,44 L1182,18 L1156,18"/>
    <path d="M18,256 L18,282 L44,282"/>
    <path d="M1182,256 L1182,282 L1156,282"/>
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
  </g>

  <!-- eyebrow -->
  <text x="56" y="48" font-family="'Courier New', monospace" font-size="14" letter-spacing="4" fill="#9aa3ad">THREAT INTELLIGENCE CLI</text>
  <line x1="56" y1="58" x2="430" y2="58" stroke="#ff1744" stroke-opacity="0.5" stroke-width="1"/>

  <!-- title with always-visible chromatic split (glitch look even fully static) -->
  <g font-family="'Courier New', monospace" font-size="70" font-weight="bold">
    <text x="53" y="140" fill="#ff1744" opacity="0.55">
      PHISHGUARD
      <animate attributeName="x" values="53;53;60;53" keyTimes="0;0.9;0.93;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="59" y="140" fill="#00e5ff" opacity="0.5">
      PHISHGUARD
      <animate attributeName="x" values="59;59;52;59" keyTimes="0;0.9;0.93;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="56" y="140" fill="#f2f4f6">PHISHGUARD</text>
  </g>

  <!-- capability chips -->
  <g font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#f2f4f6">
    <rect x="58" y="162" width="88" height="26" rx="3" fill="none" stroke="#ff1744" stroke-width="1.5"/>
    <text x="72" y="180">URL</text>
    <circle cx="132" cy="175" r="4" fill="#ff1744"><animate attributeName="opacity" values="1;0.35;1" dur="1.1s" repeatCount="indefinite"/></circle>

    <rect x="156" y="162" width="98" height="26" rx="3" fill="none" stroke="#ff1744" stroke-width="1.5"/>
    <text x="170" y="180">HTML</text>
    <circle cx="238" cy="175" r="4" fill="#ffb020"><animate attributeName="opacity" values="1;0.35;1" dur="1.4s" begin="0.3s" repeatCount="indefinite"/></circle>

    <rect x="264" y="162" width="88" height="26" rx="3" fill="none" stroke="#ff1744" stroke-width="1.5"/>
    <text x="278" y="180">SMS</text>
    <circle cx="338" cy="175" r="4" fill="#00ff66"><animate attributeName="opacity" values="1;0.35;1" dur="0.9s" begin="0.15s" repeatCount="indefinite"/></circle>

    <rect x="362" y="162" width="110" height="26" rx="3" fill="none" stroke="#ff1744" stroke-width="1.5"/>
    <text x="376" y="180">BRAND</text>
    <circle cx="458" cy="175" r="4" fill="#ff1744"><animate attributeName="opacity" values="1;0.35;1" dur="1.2s" begin="0.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- terminal: all lines always visible (static, no reveal-dependency) -->
  <g font-family="'Courier New', monospace" font-size="13.5">
    <rect x="56" y="200" width="640" height="82" fill="#000000" opacity="0.55" rx="3" stroke="#ff1744" stroke-opacity="0.35"/>
    <text x="66" y="218" fill="#00ff66">$ scan --url paypa1-secure-login.com</text>
    <text x="66" y="237" fill="#9aa3ad">&gt; domain match: <tspan fill="#ff1744" font-weight="bold">FAILED</tspan></text>
    <text x="66" y="256" fill="#9aa3ad">&gt; brand lookup: PayPal Inc — <tspan fill="#ff1744" font-weight="bold">SPOOFED</tspan></text>
    <text x="66" y="275" fill="#ff1744" font-weight="bold">&gt;&gt; VERDICT: DANGEROUS — LINK BLOCKED</text>
  </g>

  <!-- signature: hook through shield -->
  <g transform="translate(1005,150)">
    <circle r="90" fill="url(#hookGlow)" filter="url(#blur)">
      <animate attributeName="r" values="85;100;85" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <!-- shockwave rings: always visible, animation just pulses size -->
    <circle r="55" fill="none" stroke="#ff1744" stroke-width="2" opacity="0.55">
      <animate attributeName="r" values="45;70;45" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>

    <!-- shield with always-visible crack lines -->
    <path d="M0,-62 L46,-42 V10 C46,48 24,72 0,84 C-24,72 -46,48 -46,10 V-42 Z"
          fill="#0a0a0a" stroke="#ff1744" stroke-width="3"/>
    <g stroke="#f2f4f6" stroke-width="1.5" opacity="0.55">
      <path d="M0,-62 L-10,-10 L14,4 L-6,40 L20,60"/>
      <path d="M46,-20 L6,-8 L18,20"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" repeatCount="indefinite"/>
    </g>

    <!-- hook piercing through -->
    <g transform="rotate(-24)">
      <path d="M-6,-90 C-6,-40 -6,10 -6,38 C-6,66 18,74 34,52"
            fill="none" stroke="#ff1744" stroke-width="12" stroke-linecap="round" filter="url(#blur)" opacity="0.7"/>
      <path d="M-6,-90 C-6,-40 -6,10 -6,38 C-6,66 18,74 34,52"
            fill="none" stroke="#ff3355" stroke-width="7" stroke-linecap="round"/>
      <path d="M-6,-90 C-6,-40 -6,10 -6,38 C-6,66 18,74 34,52"
            fill="none" stroke="#ffb3bd" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    </g>
  </g>

  <text x="1005" y="255" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" letter-spacing="2" fill="#ff1744">
    RISK: CRITICAL
    <animate attributeName="opacity" values="1;0.45;1" dur="1s" repeatCount="indefinite"/>
  </text>

  <!-- verdict badges -->
  <g font-family="'Courier New', monospace" font-size="13" font-weight="bold">
    <rect x="895" y="270" width="106" height="24" rx="3" fill="#00ff66"/>
    <text x="908" y="286" fill="#000">APPROVED</text>
    <rect x="770" y="270" width="102" height="24" rx="3" fill="#ffb020"/>
    <text x="784" y="286" fill="#000">DOUBTFUL</text>
    <rect x="1010" y="270" width="100" height="24" rx="3" fill="#ff1744" opacity="0.85">
      <animate attributeName="opacity" values="1;0.6;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="1024" y="286" fill="#000">REJECTED</text>
  </g>
</svg>
