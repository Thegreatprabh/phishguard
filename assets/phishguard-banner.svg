<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.48" stop-color="#10131f"/>
      <stop offset="1" stop-color="#18080b"/>
    </linearGradient>
    <linearGradient id="accent" x1="144" y1="44" x2="1115" y2="347" gradientUnits="userSpaceOnUse">
      <stop stop-color="#29f2a9"/>
      <stop offset="0.45" stop-color="#36a3ff"/>
      <stop offset="1" stop-color="#ff384f"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.94 0 0 0 0 0.68 0 0 0 0.9 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#29f2a9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#29f2a9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#29f2a9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="30" fill="url(#grid)"/>
  <rect x="38" y="34" width="1204" height="352" rx="22" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.8"/>
  <rect x="-260" y="40" width="220" height="342" fill="url(#scan)" opacity="0.55">
